[tool.uv.workspace]
members = ["src/abac_charpente", "src/sapeg_regen_stock", "src/abac_visuel"]

[tool.uv.sources]
sapeg-regen-stock = { workspace = true }
abac-charpente = { workspace = true }

[dependency-groups]
dev = [
    "abac-charpente[dev]",
    "duckdb>=1.5.1",
    "handcalcs>=1.11.0",
    "pykernel>=0.1.6",
    "zarr>=3.1.6",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "slow: tests de performance (exclure avec -m 'not slow')",
]

[tool.coverage.run]
source = ["src"]
