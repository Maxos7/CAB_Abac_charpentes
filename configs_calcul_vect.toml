# -----------------------------------------------------------------------------
# Panne aplomb — section verticale (âme verticale)
# Double flexion intrinsèque — pas besoin de double_flexion = true
# -----------------------------------------------------------------------------
[[config_calcul]]
id_config_calcul = "PANNE_APLOMB"
type_poutre       = "PanneAplomb"
usage             = "panne_standard"

L_min_m           = 2.0
L_max_m           = 8.0
pas_longueur_m    = 0.25

pente_deg         = [30, 45]
entraxe_m         = [1.2]
classe_service    = 1

g_k_kNm2          = 0.40
q_k_kNm2          = 0.0
categorie_q       = "H"
s_k_kNm2          = 0.36
w_k_kNm2          = 0.0

entraxe_antideversement_mm = 0.0
longueur_appui_mm          = 60.0

  [[config_calcul.filtres]]
  champ     = "classe_resistance"
  operateur = "in"
  valeur    = ["C24", "GL24h"]

  [[config_calcul.filtres]]
  champ     = "h_mm"
  operateur = ">="
  valeur    = 160


# -----------------------------------------------------------------------------
# Panne déversée — section tournée d'un angle β (versage)
# β = 0° → identique Panne ; β = 90° → identique PanneAplomb
# -----------------------------------------------------------------------------
[[config_calcul]]
id_config_calcul = "PANNE_DEVERSEE"
type_poutre       = "PanneDeversee"
usage             = "panne_standard"

L_min_m           = 2.0
L_max_m           = 8.0
pas_longueur_m    = 0.25

pente_deg         = [30, 45]
entraxe_m         = [1.2]
classe_service    = 1

g_k_kNm2          = 0.40
q_k_kNm2          = 0.0
categorie_q       = "H"
s_k_kNm2          = 0.36
w_k_kNm2          = 0.0

entraxe_antideversement_mm = 0.0
longueur_appui_mm          = 60.0

  [[config_calcul.filtres]]
  champ     = "classe_resistance"
  operateur = "in"
  valeur    = ["C24", "GL24h"]


