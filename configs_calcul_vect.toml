# =============================================================================
# configs_calcul_vect.toml
# Configuration du pipeline EC5 vectorisé — abac_charpente_vectoriser
#
# Usage CLI :
#   uv run abac-vect --toml configs_calcul_vect.toml --stock stock.csv
#
# Champs multi-valués (liste) → produit cartésien automatique.
# Résultats écrits dans ./resultats/ par défaut.
# =============================================================================


